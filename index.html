<!DOCTYPE html>
<html>
<head>
<title>AI Creator</title>

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,sans-serif;
background:#08080b;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#111;
}

.logo{
font-size:24px;
font-weight:bold;
}

button{
background:#7c3cff;
color:white;
border:0;
padding:12px 25px;
border-radius:12px;
cursor:pointer;
}

.hero{
text-align:center;
padding:60px 20px;
}

.hero h1{
font-size:45px;
}

.hero p{
color:#aaa;
font-size:18px;
}

.creator-box{
max-width:700px;
margin:30px auto;
background:#17171c;
padding:25px;
border-radius:20px;
}

textarea{
width:100%;
height:130px;
padding:15px;
background:#25252b;
border:0;
border-radius:15px;
color:white;
font-size:16px;
resize:none;
}

.result{
margin-top:20px;
background:#101014;
padding:15px;
border-radius:15px;
display:none;
}

.features{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
padding:30px;
}

.card{
background:#17171c;
width:250px;
padding:25px;
border-radius:20px;
}

.card h2{
font-size:22px;
}

footer{
text-align:center;
padding:30px;
color:#777;
}

@media(max-width:600px){
.hero h1{
font-size:32px;
}
}
</style>

</head>

<body>

<header>
<div class="logo">⚡ Gen Creator AI</div>
<button>Đăng nhập</button>
</header>


<section class="hero">

<h1>Tạo nội dung bằng AI</h1>

<p>Biến ý tưởng thành video, ảnh và kịch bản chỉ trong vài giây.</p>


<div class="creator-box">

<textarea id="idea" placeholder="Nhập ý tưởng của bạn..."></textarea>

<br><br>

<button onclick="createAI()">✨ Tạo nội dung</button>


<div class="result" id="result"></div>

</div>

</section>



<section class="features">

<div class="card">
<h2>🎬 Video AI</h2>
<p>Tạo video từ câu lệnh bằng AI.</p>
</div>


<div class="card">
<h2>🖼 Ảnh AI</h2>
<p>Tạo hình ảnh theo mô tả.</p>
</div>


<div class="card">
<h2>✍️ Script AI</h2>
<p>Viết kịch bản YouTube, TikTok.</p>
</div>


</section>


<footer>
© 2026 Gen Creator AI
</footer>


<script>

function createAI(){

let idea=document.getElementById("idea").value;

let result=document.getElementById("result");


if(idea==""){
alert("Hãy nhập ý tưởng trước!");
return;
}


result.style.display="block";

result.innerHTML=
"🤖 AI đang xử lý...<br><br>"+
"Ý tưởng của bạn: "+idea+
"<br><br>✅ Nội dung mẫu đã được tạo!";

}

</script>


</body>
</html>
